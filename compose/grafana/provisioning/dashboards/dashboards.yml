# ──────────────────────────────────────────────────────────────────────────────
#  Grafana dashboard provider · auto-load every JSON under /var/lib/grafana/dashboards
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: 1

providers:
  - name: nexus-local
    orgId: 1
    folder: NexusPlatform
    folderUid: nexus-local
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: false
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
