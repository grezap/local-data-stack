# ──────────────────────────────────────────────────────────────────────────────
#  NexusPlatform · Prometheus · scrape config
# ──────────────────────────────────────────────────────────────────────────────
#  App-level metrics arrive via OTLP → otel-collector → prometheus exporter on
#  :8889. Prometheus scrapes that, plus each backend's own self-metrics.
#  Remote-write receiver is enabled on the server (see --web flags) so apps may
#  also push directly for experiments without going through the collector.
# ──────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: nexus-local
    environment: local

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # App metrics, funneled by the collector's prometheus exporter.
  - job_name: otel-collector-app-metrics
    static_configs:
      - targets: ["otel-collector:8889"]
    metric_relabel_configs:
      # Drop noisy histogram _bucket series we never query.
      - source_labels: [__name__]
        regex: "http_server_request_duration_seconds_bucket"
        action: keep

  # Collector's own runtime health.
  - job_name: otel-collector-self
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: clickhouse
    metrics_path: /metrics
    static_configs:
      - targets: ["clickhouse:9363"]

  # Kafka does not ship a built-in Prometheus endpoint in the apache/kafka
  # image; metrics flow via JMX → OTel Collector when the JMX receiver is
  # enabled. Placeholder kept for Vol-1 evolution (ADR-0004 candidate).
