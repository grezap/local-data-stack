# ──────────────────────────────────────────────────────────────────────────────
#  Dependabot · automated pinned-version bumps
# ──────────────────────────────────────────────────────────────────────────────

version: 2

updates:

  # Docker image tags referenced in compose/docker-compose.yml
  - package-ecosystem: docker-compose
    directory: /compose
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Athens
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels: ["dependencies", "docker"]

  # GitHub Actions used in CI
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Athens
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
      include: scope
    labels: ["dependencies", "github-actions"]
