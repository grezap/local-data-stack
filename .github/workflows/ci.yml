# ──────────────────────────────────────────────────────────────────────────────
#  CI · local-data-stack
# ──────────────────────────────────────────────────────────────────────────────
#  Gates every change with four independent checks:
#    1. lint        — compose file schema + YAML style
#    2. smoke       — bring full stack up, run end-to-end smoke test, tear down
#    3. codeql      — static analysis of GitHub Actions workflows
#    4. trivy       — vulnerability scan of every pinned image
#
#  All third-party actions are pinned to a known-good tag. Dependabot
#  (.github/dependabot.yml) proposes weekly bumps.
# ──────────────────────────────────────────────────────────────────────────────

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"   # weekly, catches CVE drift even without commits

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  lint:
    name: compose lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate compose file
        run: |
          cp compose/.env.example compose/.env
          docker compose --project-directory compose \
            -f compose/docker-compose.yml --profile full config -q

      # A lenient style check. Anchors, YAML multi-docs, and long lines are
      # disabled on purpose — we only want blocking issues (hard-tab indent,
      # undefined anchor refs, key duplication).
      - name: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: "compose .github"
          config_data: |
            extends: relaxed
            rules:
              line-length: disable
              document-start: disable
              comments: disable
              comments-indentation: disable
              truthy: disable
              indentation:
                spaces: 2
                indent-sequences: consistent

  smoke:
    name: end-to-end smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - name: Prepare environment
        run: cp compose/.env.example compose/.env
      - name: Bring up full stack
        run: make up P=full
      - name: Wait for healthy
        run: |
          for i in {1..90}; do
            bad=$(docker ps --format '{{.Names}} {{.Status}}' | grep -c '(unhealthy)') || true
            pending=$(docker ps --format '{{.Names}} {{.Status}}' | grep -c 'health: starting') || true
            if [[ "$bad" == 0 && "$pending" == 0 ]]; then echo "all healthy"; exit 0; fi
            echo "waiting... ($i) pending=$pending unhealthy=$bad"
            sleep 5
          done
          echo "stack did not reach healthy" && docker ps && exit 1
      - name: Run smoke test
        run: make smoke
      - name: Dump logs on failure
        if: failure()
        run: make logs || true
      - name: Tear down
        if: always()
        run: |
          # make nuke prompts in interactive shells; use compose directly in CI
          docker compose --project-directory compose \
            -f compose/docker-compose.yml --profile full down --remove-orphans --volumes

  # CodeQL scans the workflow YAML itself for injection / permissions issues.
  # No JavaScript/TypeScript lives in this repo, so we intentionally target
  # `actions` only. (Scanning `javascript` fails: CodeQL reports no code.)
  codeql:
    name: CodeQL (actions)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: actions
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:actions"

  trivy:
    name: trivy image scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - apache/kafka:3.8.1
          - confluentinc/cp-schema-registry:7.7.1
          - clickhouse/clickhouse-server:24.8.7.41
          - redis:7.4-alpine
          - otel/opentelemetry-collector-contrib:0.113.0
          - prom/prometheus:v3.0.1
          - grafana/grafana:11.3.0
          - jaegertracing/jaeger:2.0.0
          - datalust/seq:2024.3
    steps:
      - uses: actions/checkout@v6
      - name: Scan ${{ matrix.image }}
        # Pinned to a known-published tag; Dependabot bumps this weekly.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          format: table
          exit-code: "0"          # report only; tighten to "1" after baseline is clean
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          timeout: "10m"
